services:
  api:
    build: ./api
    ports:
      - "8008:8008"
    mem_limit: 1024m
    volumes:
      - ./api:/app
    environment:
      - ENVIRONMENT=development
    command: uvicorn main:app --host 0.0.0.0 --port 8008 --reload

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8008
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
