user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Upstreams a los contenedores
    upstream api_vetsur {
        server api:8008;
    }

    upstream frontend_vetsur {
        server frontend:3000;
    }

    # API Server Block
    server {
        listen 80;
        server_name api.gbkjy.dev;

        # Opciones de seguridad robustas para la red
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        
        location / {
            proxy_pass http://api_vetsur;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }
        
        # Opciones de Let's Encrypt irían aquí
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # Frontend Server Block
    server {
        listen 80;
        server_name vetsur.gbkjy.dev;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        location / {
            proxy_pass http://frontend_vetsur;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
