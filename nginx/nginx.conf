events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compresión Gzip para mayor velocidad
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Nota: Esta sección redirige todo el tráfico de HTTP a HTTPS para asegurar la conexión.
    server {
        listen 80;
        server_name vetsur.gbkjy.dev;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Configuración principal HTTPS
    server {
        listen 443 ssl;
        server_name vetsur.gbkjy.dev;

        ssl_certificate /etc/letsencrypt/live/vetsur.gbkjy.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetsur.gbkjy.dev/privkey.pem;

        # Optimización SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Nota: Aquí Nginx decide a dónde mandar cada clic. 
        # Si la ruta es '/', carga la interfaz de Next.js.
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Nota: Si la ruta empieza con '/api/', Nginx la desvía automáticamente hacia el servidor de Python.
        location /api/ {
            proxy_pass http://api:8008/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
