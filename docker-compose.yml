# Nota: Docker Compose se encarga de "orquestar" todos los componentes. 
# Levanta el Backend (Python), el Frontend (Next.js) y el Servidor (Nginx) al mismo tiempo.
services:
  api:
    # Nota: Este es el contenedor que corre nuestra API de Inteligencia de Negocios (FastAPI).
    build: ./api
    ports: 
      - "8008:8008"
    mem_limit: 512m
    restart: always
    volumes: 
      - ./api/modelo_vetsur.pkl:/app/modelo_vetsur.pkl
      - ./api/columnas_vetsur.json:/app/columnas_vetsur.json
      - ./api/data:/app/data
    env_file: .env

  frontend:
    # Nota: Este contenedor tiene la interfaz de usuario moderna hecha con Next.js y Tailwind.
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports: 
      - "3000:3000"
    mem_limit: 512m
    restart: always
    depends_on: 
      - api
    env_file: .env

  nginx:
    # Nota: Nginx actúa como el portero (Proxy) para manejar el tráfico y dar seguridad HTTPS.
    image: nginx:alpine
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on: 
      - api
      - frontend
    restart: always
