services:
  api:
    image: gbkjy/vetsur-api:latest
    build: ./api
    ports:
      - "8008:8008"
    mem_limit: 512m
    restart: always
    volumes:
      - ./api/modelo_vetsur.pkl:/app/modelo_vetsur.pkl
      - ./api/columnas_vetsur.json:/app/columnas_vetsur.json
      - ./api/data:/app/data
    env_file: .env

  frontend:
    image: gbkjy/vetsur-frontend:latest
    ports:
      - "3000:3000"
    mem_limit: 512m
    restart: always
    depends_on:
      - api
    env_file: .env

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - frontend
    restart: always

networks:
  default:
    name: proxy-network
    external: true
